name: Release

# Release pipeline: runs only on version tags. Day-to-day validation
# (typecheck + tests + build on every push/PR) lives in ci.yml.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Gate: reuse the full CI workflow. The release jobs below depend on this,
  # so an untested commit can never produce a release.
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.PAT_TOKEN || github.token }}

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Set version from tag
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT

        # Use our sync-version script instead of manual updates
        npm version $VERSION --no-git-tag-version --allow-same-version
        set -e
        node scripts/sync-version.js || { echo "Error: sync-version.js failed"; exit 1; }

        # Commit version updates with [skip ci] to avoid circular trigger.
        # When the tag already matches the committed version the sync produces
        # no changes — that is success, not failure, so only commit/push when
        # something actually changed.
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add package.json public/manifest.json
        if git diff --staged --quiet; then
          echo "Versions already in sync with tag; nothing to commit."
        else
          git commit -m "chore: Sync versions to $VERSION [skip ci]"
          git push origin HEAD:main
        fi

    - name: Build
      run: npm run build
      env:
        NODE_ENV: production

    - name: Create artifacts directory
      run: mkdir -p artifacts

    - name: Create versioned zip
      run: |
        cd dist
        zip -r "../artifacts/azure-devops-wiki-editor-v${{ steps.get_version.outputs.version }}.zip" *

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: extension-dist-v${{ steps.get_version.outputs.version }}
        path: artifacts/azure-devops-wiki-editor-v${{ steps.get_version.outputs.version }}.zip
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Get Version
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: extension-dist-v${{ steps.get_version.outputs.version }}
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/azure-devops-wiki-editor-v${{ steps.get_version.outputs.version }}.zip
        generate_release_notes: true
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
