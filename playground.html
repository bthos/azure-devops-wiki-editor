<!DOCTYPE html>
<html>
<head>
    <title>Editor Test - Milkdown</title>
    <!-- Milkdown CSS -->
    <link rel="stylesheet" href="dist/custom-styles.css" />
    <link rel="stylesheet" href="dist/milkdown-editor.css" />
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden; /* Prevent page scroll */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: #f5f5f5;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        h1 {
            color: #323130;
            margin-bottom: 20px;
        }
        
        /* Theme switcher */
        .theme-switcher {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .theme-switcher label {
            font-weight: 600;
            color: #323130;
        }
        .theme-switcher select {
            padding: 8px 12px;
            border: 1px solid #8a8886;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            background: white;
        }
        .theme-switcher select:focus {
            outline: none;
            border-color: #0078d4;
        }
        
        /* Dark theme page styles */
        body[data-theme="ms.vss-web.vsts-theme-dark"] {
            background: #1b1a19;
            color: #f3f2f1;
        }
        body[data-theme="ms.vss-web.vsts-theme-dark"] h1 {
            color: #f3f2f1;
        }
        body[data-theme="ms.vss-web.vsts-theme-dark"] .theme-switcher {
            background: #252423;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        body[data-theme="ms.vss-web.vsts-theme-dark"] .theme-switcher label {
            color: #f3f2f1;
        }
        body[data-theme="ms.vss-web.vsts-theme-dark"] .theme-switcher select {
            background: #1b1a19;
            border-color: #605e5c;
            color: #f3f2f1;
        }
        body[data-theme="ms.vss-web.vsts-theme-dark"] .wiki-editor {
            background: #252423;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        body[data-theme="ms.vss-web.vsts-theme-dark"] .we-toolbar-container {
            background: #323130;
            border-color: #3b3a39;
        }
        body[data-theme="ms.vss-web.vsts-theme-dark"] .we-toolbar-container button {
            background: #252423;
            border-color: #605e5c;
            color: #f3f2f1;
        }
        body[data-theme="ms.vss-web.vsts-theme-dark"] .we-ta-container textarea {
            background: #1b1a19;
            border-color: #605e5c;
            color: #f3f2f1;
        }
        body[data-theme="ms.vss-web.vsts-theme-dark"] .we-text-preview-container {
            background: #1b1a19;
            border-color: #3b3a39;
            color: #a19f9d;
        }
        body[data-theme="ms.vss-web.vsts-theme-dark"] .instructions {
            background: #3d3225;
            border-color: #c19c00;
            color: #f3f2f1;
        }
        body[data-theme="ms.vss-web.vsts-theme-dark"] .instructions h3 {
            color: #ffb900;
        }
        
        /* High Contrast Dark theme page styles */
        body[data-theme="ms.vss-web.vsts-theme-hc-dark"] {
            background: #000000;
            color: #ffffff;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-dark"] h1 {
            color: #ffffff;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-dark"] .theme-switcher {
            background: #000000;
            border: 2px solid #ffffff;
            box-shadow: none;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-dark"] .theme-switcher label {
            color: #ffffff;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-dark"] .theme-switcher select {
            background: #000000;
            border: 2px solid #ffffff;
            color: #ffffff;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-dark"] .wiki-editor {
            background: #000000;
            border: 2px solid #ffffff;
            box-shadow: none;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-dark"] .we-toolbar-container {
            background: #000000;
            border-color: #ffffff;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-dark"] .we-toolbar-container button {
            background: #000000;
            border: 2px solid #ffffff;
            color: #ffffff;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-dark"] .we-ta-container textarea {
            background: #000000;
            border: 2px solid #ffffff;
            color: #ffffff;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-dark"] .we-text-preview-container {
            background: #000000;
            border: 2px solid #ffffff;
            color: #ffffff;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-dark"] .instructions {
            background: #000000;
            border: 2px solid #1aebff;
            color: #ffffff;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-dark"] .instructions h3 {
            color: #1aebff;
        }
        
        /* High Contrast Light theme page styles */
        body[data-theme="ms.vss-web.vsts-theme-hc-light"] {
            background: #ffffff;
            color: #000000;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-light"] h1 {
            color: #000000;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-light"] .theme-switcher {
            background: #ffffff;
            border: 2px solid #000000;
            box-shadow: none;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-light"] .theme-switcher label {
            color: #000000;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-light"] .theme-switcher select {
            background: #ffffff;
            border: 2px solid #000000;
            color: #000000;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-light"] .wiki-editor {
            background: #ffffff;
            border: 2px solid #000000;
            box-shadow: none;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-light"] .we-toolbar-container {
            background: #ffffff;
            border-color: #000000;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-light"] .we-toolbar-container button {
            background: #ffffff;
            border: 2px solid #000000;
            color: #000000;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-light"] .we-ta-container textarea {
            background: #ffffff;
            border: 2px solid #000000;
            color: #000000;
        }
        body[data-theme="ms.vss-web.vsts-theme-hc-light"] .we-text-preview-container {
            background: #ffffff;
            border: 2px solid #000000;
            color: #000000;
        }
        
        .wiki-editor {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            /* Flex to fill remaining space */
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0; /* Allow shrinking */
        }
        
        /* When WYSIWYG mode is active, hide textarea container and form elements */
        .wiki-editor:has(#milkdown-editor[style*="display: block"]) .we-ta-container {
            display: none !important;
        }
        .wiki-editor:has(#milkdown-editor[style*="display: block"]) .we-toolbar-container {
            display: none !important;
        }
        .wiki-editor:has(#milkdown-editor[style*="display: block"]) form {
            display: none !important;
        }
        
        /* Ensure form fills the wiki-editor */
        .wiki-editor form {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        
        /* Page header elements - don't flex */
        h1, .theme-switcher {
            flex-shrink: 0;
        }
        /* Simulate ADO toolbar */
        .we-toolbar-container {
            padding: 10px;
            background: #f3f2f1;
            border-bottom: 1px solid #e1e1e1;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .we-toolbar-container button {
            padding: 6px 12px;
            background: white;
            border: 1px solid #c8c6c4;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .we-toolbar-container button:hover {
            background: #f3f2f1;
        }
        .we-toolbar-container button[type="submit"] {
            margin-left: auto;
            background: #0078d4;
            color: white;
            border-color: #0078d4;
        }
        .we-toolbar-container button[type="submit"]:hover {
            background: #106ebe;
        }
        .we-ta-container {
            padding: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: auto;
        }
        .we-ta-container textarea {
            width: 100%;
            flex: 1;
            padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            border: 1px solid #c8c6c4;
            border-radius: 4px;
            resize: none;
            box-sizing: border-box;
        }
        /* Milkdown editor container - occupies same space as textarea */
        #milkdown-editor {
            flex: 1;
            min-height: 0;
            overflow: auto;
            display: none; /* Hidden by default, shown via JS */
        }
        #milkdown-editor .milkdown {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        #milkdown-editor .milkdown .editor {
            flex: 1;
            overflow: auto;
        }
    </style>
</head>
<body>
    <h1>🖊️ Azure DevOps Wiki Editor Test (Milkdown)</h1>
    
    <div class="theme-switcher">
        <label for="themeSelect">🎨 Theme:</label>
        <select id="themeSelect">
            <option value="">Light (default)</option>
            <option value="ms.vss-web.vsts-theme-dark">Dark</option>
            <option value="ms.vss-web.vsts-theme-hc-dark">High Contrast Dark</option>
            <option value="ms.vss-web.vsts-theme-hc-light">High Contrast Light</option>
        </select>
    </div>

    <div class="wiki-editor">
        <form id="wikiForm" onsubmit="event.preventDefault(); alert('Form content:\n\n' + document.querySelector('.we-ta-container textarea').value);">
            <!-- Simulated ADO toolbar -->
            <div class="we-toolbar-container">
                <button type="button">Bold</button>
                <button type="button">Italic</button>
                <button type="button">Link</button>
                <button type="button">Image</button>
                <button type="button">Code</button>
                <button type="submit">Save Changes</button>
            </div>
            
            <div class="we-ta-container">
                <textarea placeholder="Enter markdown content here...">
# Test Document

                </textarea>
            </div>
        </form>
    </div>
    
    <script>
        // Theme switcher functionality
        document.getElementById('themeSelect').addEventListener('change', function() {
            const theme = this.value;
            if (theme) {
                document.body.setAttribute('data-theme', theme);
            } else {
                document.body.removeAttribute('data-theme');
            }
            // Save to localStorage
            localStorage.setItem('test-theme', theme);
        });
        
        // Restore saved theme
        const savedTheme = localStorage.getItem('test-theme');
        if (savedTheme) {
            document.body.setAttribute('data-theme', savedTheme);
            document.getElementById('themeSelect').value = savedTheme;
        }
        
        // Add error handling for script loading
        window.onerror = function(msg, url, line, col, error) {
            console.error('An error occurred:', msg, 'at', url, 'line:', line);
            return false;
        };
        
        // Load editor-bundle.js first and wait for it to complete
        const editorScript = document.createElement('script');
        editorScript.src = 'dist/editor-bundle.js';
        editorScript.onload = function() {
            console.log('Editor bundle loaded successfully');
            // Only load main.js after editor-bundle.js is loaded
            const mainScript = document.createElement('script');
            mainScript.src = 'dist/main.js';
            mainScript.onload = function() {
                console.log('Main script loaded successfully');
            };
            document.body.appendChild(mainScript);
        };
        editorScript.onerror = function() {
            console.error('Failed to load editor-bundle.js');
        };
        document.body.appendChild(editorScript);
    </script>
</body>
</html>
